<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurgerByte Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Google fonts -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand navbar-logo-text" href="#">Burger <span>Byte</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active pe-4" aria-current="page" href="/index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link pe-4" href="/about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link pe-4" href="/contact.html">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/food.html">Food</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/menuItem.html">Menu</a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <button class="btn nav-btn" type="submit">Login</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Menu Items -->
    <div class="container menu-item-filter-container">
        <h3 class="mt-3 mb-3">Filter Menu By Category</h3>
        <div class="mt-5 mb-5">
            <button id="display-all-items" class="btn menu-item-filter-btn">All</button>
            <button id="filter-burger-btn" class="btn menu-item-filter-btn">Burger</button>
            <button id="filter-cake-btn" class="btn menu-item-filter-btn">Cake</button>
            <button id="filter-drink-btn" class="btn menu-item-filter-btn">Drinks</button>
        </div>
    </div>

    <!-- Menu Items will display here -->
    <section class="container">
        <div class="row gx-3 gy-5" id="menu-cards-container">
            <!-- Menu Item cards display here -->
        </div>
    </section>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
